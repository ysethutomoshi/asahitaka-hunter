<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍶 朝日鷹ハンター〜鷹狩の記録〜</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="朝日鷹ハンター">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <!-- React / Babel / Tailwind -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <!-- Other libraries -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .leaflet-pane { z-index: 10 !important; }
    .leaflet-top, .leaflet-bottom { z-index: 15 !important; }
    .leaflet-popup { z-index: 20 !important; }
    .tab-scroll::-webkit-scrollbar { display: none; }
    .tab-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeInUp { from { opacity:0;transform:translateY(16px) } to { opacity:1;transform:translateY(0) } }
    @keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
    @keyframes slideDown{ from { opacity:0;transform:translateY(-8px) } to { opacity:1;transform:translateY(0) } }
    @keyframes popIn    { 0%{opacity:0;transform:scale(.85)} 70%{transform:scale(1.04)} 100%{opacity:1;transform:scale(1)} }
    @keyframes spin     { to { transform:rotate(360deg) } }
    @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:.5} }
    @keyframes bar-grow { from { width:0 } }
    @keyframes stamp { 0%{opacity:0;transform:scale(2.2) rotate(-15deg)} 40%{opacity:1;transform:scale(.88) rotate(3deg)} 65%{transform:scale(1.06) rotate(-1deg)} 100%{opacity:1;transform:scale(1) rotate(0deg)} }
    @keyframes inkSpread { 0%{box-shadow:0 0 0 0 rgba(79,70,229,.5)} 100%{box-shadow:0 0 0 10px rgba(79,70,229,0)} }
    .stamp-appear { animation:stamp .45s cubic-bezier(.34,1.2,.64,1) both }
    .stamp-ink    { animation:inkSpread .5s ease-out both }
    .anim-fade-in-up { animation:fadeInUp .35s ease both }
    .anim-fade-in    { animation:fadeIn .25s ease both }
    .anim-slide-down { animation:slideDown .25s ease both }
    .anim-pop-in     { animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both }
    .anim-spin       { animation:spin .8s linear infinite }
    .anim-pulse      { animation:pulse-soft 1.4s ease-in-out infinite }
    .anim-bar        { animation:bar-grow .6s ease both }
    .card-hover { transition:transform .18s ease,box-shadow .18s ease }
    .card-hover:hover { transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.10) }
    .tab-content { animation:fadeInUp .28s ease both }
    button:active { transform:scale(.97) }
  </style>
</head>
<body class="bg-gray-100">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  // ============================================================
  // ローカルストレージキー（Firebase設定・APIキーのみ）
  // ============================================================
  const LS = {
    FB_CONFIG:   'asahitaka_fb_config',
    GROUP_ID:    'asahitaka_fb_group_id',
    NICKNAME:    'asahitaka_fb_nickname',
    API_KEY:     'asahitaka_api_key',
    NOTIF_CHK:   'asahitaka_last_notif_check',
    PENDING_JOIN:'asahitaka_fb_pending_join',
  };

  // ============================================================
  // ユーティリティ
  // ============================================================
  const generateId = (p='id') => `${p}_${Date.now()}_${Math.random().toString(36).substr(2,9)}`;
  const today = () => new Date().toISOString().split('T')[0];
  const formatDate = (s) => {
    if (!s) return '';
    const [y,m,d] = s.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  };
  const daysSince = (s) => Math.floor((Date.now()-new Date(s))/86400000);

  const compressImage = (dataUrl, maxWidth=600) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const r = Math.min(maxWidth/img.width, 1);
      const c = document.createElement('canvas');
      c.width=Math.floor(img.width*r); c.height=Math.floor(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg', 0.75));
    };
    img.src = dataUrl;
  });

  const callClaudeAPI = async (apiKey, messages, maxTokens=1000) => {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:maxTokens, messages }),
    });
    if (!res.ok) throw new Error(`API Error: ${res.status}`);
    const d = await res.json();
    return d.content.find(c=>c.type==='text')?.text||'';
  };

  const extractJSON = (text) => {
    const m = text.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : null;
  };

  const EXTRACT_PROMPT = `この情報から朝日鷹の購入・目撃情報を抽出してください。
以下のJSON形式のみで返してください：
{"date":"YYYY-MM-DD","store":"店舗名","location":"都道府県市区町村","product":"低温貯蔵酒|生貯蔵酒|生酒","volume":"1800ml|720ml","price":数値またはnull,"memo":"その他情報またはnull"}
情報が読み取れない項目はnullにしてください。JSONのみを返してください。`;

  // ============================================================
  // Firebase ヘルパー
  // ============================================================
  const fbRef = (path) => firebase.database().ref(path);
  const BASE_PATH = 'asahitaka-hunter/groups';

  const db = {
    addRecord: async (groupId, record) => {
      const id = record.id || generateId('rec');
      await fbRef(`${BASE_PATH}/${groupId}/records/${id}`).set({
        ...record, id, createdAt: new Date().toISOString(),
      });
      return id;
    },
    updateRecord: async (groupId, id, updates) => {
      await fbRef(`${BASE_PATH}/${groupId}/records/${id}`).update({
        ...updates, updatedAt: new Date().toISOString(),
      });
    },
    deleteRecord: async (groupId, id) => {
      await fbRef(`${BASE_PATH}/${groupId}/records/${id}`).remove();
    },
    createGroup: async (groupId, userId, nickname) => {
      const now = new Date().toISOString();
      await fbRef(`${BASE_PATH}/${groupId}`).set({
        info: { name:'朝日鷹グループ', createdAt:now, createdBy:userId },
        users: { [userId]: { nickname, role:'admin', joinedAt:now } },
        records: {},
      });
    },
    addUser: async (groupId, userId, nickname) => {
      await fbRef(`${BASE_PATH}/${groupId}/users/${userId}`).set({
        nickname, role:'member', joinedAt: new Date().toISOString(),
      });
    },
    getGroupInfo: async (groupId) => {
      const snap = await fbRef(`${BASE_PATH}/${groupId}/info`).once('value');
      return snap.val();
    },
    watchRecords: (groupId, callback) => {
      const ref = fbRef(`${BASE_PATH}/${groupId}/records`);
      const handler = (snap) => {
        const data = snap.val();
        const list = data
          ? Object.entries(data).map(([id, r]) => ({ ...r, id }))
          : [];
        callback(list.sort((a,b) => (b.date||'').localeCompare(a.date||'')));
      };
      ref.on('value', handler);
      return () => ref.off('value', handler);
    },
    watchUsers: (groupId, callback) => {
      const ref = fbRef(`${BASE_PATH}/${groupId}/users`);
      const handler = (snap) => {
        const data = snap.val();
        callback(data ? Object.entries(data).map(([id,u]) => ({...u, id})) : []);
      };
      ref.on('value', handler);
      return () => ref.off('value', handler);
    },
    deleteAllRecords: async (groupId) => {
      await fbRef(`${BASE_PATH}/${groupId}/records`).remove();
    },
    saveSession: async (uid, groupId, nickname) => {
      await fbRef(`sessions/${uid}`).set({ groupId, nickname, updatedAt: new Date().toISOString() });
    },
    getSession: async (uid) => {
      const snap = await fbRef(`sessions/${uid}`).once('value');
      return snap.val();
    },
    removeSession: async (uid) => {
      await fbRef(`sessions/${uid}`).remove();
    },
    updateUserNickname: async (groupId, userId, nickname) => {
      await fbRef(`${BASE_PATH}/${groupId}/users/${userId}/nickname`).set(nickname);
    },
    removeUser: async (groupId, userId) => {
      await fbRef(`${BASE_PATH}/${groupId}/users/${userId}`).remove();
    },
  };

  // ============================================================
  // Firebase リアルタイム同期フック
  // ============================================================
  const useFirebaseSync = (groupId) => {
    const [records, setRecords] = useState([]);
    const [users,   setUsers]   = useState([]);
    const [syncing, setSyncing] = useState(false);

    useEffect(() => {
      if (!groupId) return;
      setSyncing(true);
      const unsubRec = db.watchRecords(groupId, (recs) => {
        setRecords(recs); setSyncing(false);
      });
      const unsubUsr = db.watchUsers(groupId, setUsers);
      return () => { unsubRec(); unsubUsr(); };
    }, [groupId]);

    return { records, users, syncing };
  };

  // ============================================================
  // 共通フォームフィールド
  // ============================================================
  const inputCls = "w-full border border-gray-300 rounded-lg px-3 py-2.5 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500";
  const labelCls = "block text-sm font-medium text-gray-700 mb-1";

  const RecordFormFields = ({ form, onChange }) => {
    const [storeSearching,    setStoreSearching]    = useState(false);
    const [locationSearching, setLocationSearching] = useState(false);
    const [storeMsg,          setStoreMsg]          = useState('');
    const [locationMsg,       setLocationMsg]       = useState('');

    const nominatim = async (query) => {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1&addressdetails=1`,
        { headers: { 'Accept-Language': 'ja,en' } }
      );
      const data = await res.json();
      return data[0] || null;
    };

    // 店舗名 → 場所を補完
    const searchByStore = async () => {
      const store = form.store.trim();
      if (!store) return;
      setStoreSearching(true); setStoreMsg('');
      try {
        const result = await nominatim(`${store} 日本`);
        if (result) {
          const addr = result.address;
          const parts = [addr.prefecture||addr.state, addr.city||addr.town||addr.village, addr.suburb||addr.neighbourhood].filter(Boolean);
          const location = parts.join('') || result.display_name.split(',').slice(0,2).join('').trim();
          onChange('location', location);
          setStoreMsg('✅ 場所を補完しました');
        } else {
          setStoreMsg('❌ 見つかりませんでした');
        }
      } catch { setStoreMsg('❌ 検索エラー'); }
      setStoreSearching(false);
      setTimeout(() => setStoreMsg(''), 3000);
    };

    // 場所 → 店舗名を補完
    const searchByLocation = async () => {
      const location = form.location.trim();
      if (!location) return;
      setLocationSearching(true); setLocationMsg('');
      try {
        const result = await nominatim(`${location} ${form.store || '酒屋'} 日本`);
        if (result) {
          const name = result.name || result.display_name.split(',')[0].trim();
          if (name && !form.store.trim()) {
            onChange('store', name);
            setLocationMsg('✅ 店舗名を補完しました');
          } else {
            const addr = result.address;
            const parts = [addr.prefecture||addr.state, addr.city||addr.town||addr.village].filter(Boolean);
            const loc = parts.join('') || result.display_name.split(',').slice(0,2).join('').trim();
            onChange('location', loc);
            setLocationMsg('✅ 場所を補正しました');
          }
        } else {
          setLocationMsg('❌ 見つかりませんでした');
        }
      } catch { setLocationMsg('❌ 検索エラー'); }
      setLocationSearching(false);
      setTimeout(() => setLocationMsg(''), 3000);
    };

    return (
      <div className="space-y-3">
        <div><label className={labelCls}>📅 購入日</label>
          <input type="date" value={form.date} onChange={e=>onChange('date',e.target.value)} className={inputCls} /></div>
        <div>
          <label className={labelCls}>🏪 店舗名 <span className="text-red-500">*</span></label>
          <div className="flex gap-2">
            <input type="text" value={form.store} onChange={e=>onChange('store',e.target.value)}
              placeholder="例：ヨークベニマル村山店" className={`${inputCls} flex-1`} />
            <button type="button" onClick={searchByStore} disabled={storeSearching||!form.store.trim()}
              title="店舗名から場所を検索"
              className="px-3 py-2 bg-blue-50 text-blue-600 rounded-lg text-sm hover:bg-blue-100 disabled:opacity-40 transition-colors whitespace-nowrap">
              {storeSearching ? '⏳' : '📍→'}
            </button>
          </div>
          {storeMsg && <p className="text-xs mt-1 text-gray-500">{storeMsg}</p>}
        </div>
        <div>
          <label className={labelCls}>📍 場所</label>
          <div className="flex gap-2">
            <input type="text" value={form.location} onChange={e=>onChange('location',e.target.value)}
              placeholder="例：山形県村山市" className={`${inputCls} flex-1`} />
            <button type="button" onClick={searchByLocation} disabled={locationSearching||!form.location.trim()}
              title="場所から店舗名を検索"
              className="px-3 py-2 bg-green-50 text-green-600 rounded-lg text-sm hover:bg-green-100 disabled:opacity-40 transition-colors whitespace-nowrap">
              {locationSearching ? '⏳' : '🏪→'}
            </button>
          </div>
          {locationMsg && <p className="text-xs mt-1 text-gray-500">{locationMsg}</p>}
        </div>
        <div><label className={labelCls}>🍶 商品種類</label>
          <select value={form.product} onChange={e=>onChange('product',e.target.value)} className={inputCls}>
            <option>低温貯蔵酒</option><option>生貯蔵酒</option><option>生酒</option>
          </select></div>
        <div><label className={labelCls}>📦 容量</label>
          <select value={form.volume} onChange={e=>onChange('volume',e.target.value)} className={inputCls}>
            <option value="1800ml">1800ml（一升瓶）</option><option value="720ml">720ml（四合瓶）</option>
          </select></div>
        <div><label className={labelCls}>💰 価格（円）</label>
          <input type="number" value={form.price} onChange={e=>onChange('price',e.target.value)} placeholder="例：2750" min="0" className={inputCls} /></div>
        <div><label className={labelCls}>📝 メモ</label>
          <textarea value={form.memo} onChange={e=>onChange('memo',e.target.value)} placeholder="例：棚に2本残っていた" rows={3} className={`${inputCls} resize-none`} /></div>
      </div>
    );
  };

  const emptyForm = () => ({ date:today(), store:'', location:'', product:'低温貯蔵酒', volume:'1800ml', price:'', memo:'' });
  const formToRecord = (form, extra) => ({
    id: generateId('rec'),
    date: form.date, store: form.store.trim(), location: form.location.trim(),
    product: form.product, volume: form.volume,
    price: form.price ? parseInt(form.price) : null,
    memo: form.memo.trim(), timestamp: new Date().toISOString(),
    latitude: null, longitude: null, ...extra,
  });

  const StatusMsg = ({ type, children }) => {
    const cls = type==='error' ? 'bg-red-50 border-red-200 text-red-700'
              : type==='success' ? 'bg-green-50 border-green-200 text-green-700'
              : 'bg-indigo-50 border-indigo-200 text-indigo-700';
    return <div className={`border rounded-lg p-3 text-sm anim-slide-down ${cls}`}>{children}</div>;
  };

  const APIKeyWarning = () => (
    <div className="bg-amber-50 border border-amber-200 rounded-xl p-5 text-center">
      <p className="text-amber-800 font-medium mb-1">⚙️ Claude APIキーが必要です</p>
      <p className="text-amber-600 text-sm">「設定」タブでAPIキーを入力してください</p>
    </div>
  );

  // ============================================================
  // Firebase設定モーダル
  // ============================================================
  const FirebaseSetupModal = ({ onComplete }) => {
    const [config, setConfig] = useState({
      apiKey:'', authDomain:'', databaseURL:'', projectId:'',
      storageBucket:'', messagingSenderId:'', appId:'',
    });
    const [connecting, setConnecting] = useState(false);
    const [error, setError] = useState('');

    const FIELDS = [
      { key:'apiKey',            label:'API Key',            ph:'AIza...' },
      { key:'authDomain',        label:'Auth Domain',        ph:'xxx.firebaseapp.com' },
      { key:'databaseURL',       label:'Database URL',       ph:'https://xxx-default-rtdb.firebaseio.com' },
      { key:'projectId',         label:'Project ID',         ph:'xxx' },
      { key:'storageBucket',     label:'Storage Bucket',     ph:'xxx.appspot.com' },
      { key:'messagingSenderId', label:'Messaging Sender ID',ph:'123...' },
      { key:'appId',             label:'App ID',             ph:'1:123:web:abc' },
    ];

    const connect = async () => {
      for (const k of ['apiKey','authDomain','databaseURL','projectId']) {
        if (!config[k].trim()) return setError(`${k} を入力してください`);
      }
      setConnecting(true); setError('');
      try {
        if (!firebase.apps.length) {
          firebase.initializeApp(Object.fromEntries(
            Object.entries(config).map(([k,v]) => [k, v.trim()])
          ));
        }
        await firebase.auth().signInAnonymously();
        localStorage.setItem(LS.FB_CONFIG, JSON.stringify(config));
        onComplete();
      } catch (e) {
        setError('接続エラー: ' + e.message);
        if (firebase.apps.length) { try { firebase.app().delete(); } catch {} }
      } finally { setConnecting(false); }
    };

    return (
      <div className="fixed inset-0 bg-indigo-900/95 flex items-start justify-center z-50 p-4 overflow-y-auto">
        <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl my-6 anim-pop-in">
          <div className="text-center mb-5">
            <div className="text-4xl mb-2">🔧</div>
            <h2 className="text-xl font-bold text-gray-800">Firebase設定</h2>
            <p className="text-gray-500 text-sm mt-1">友達とリアルタイムで情報共有するために必要です</p>
          </div>
          <div className="bg-indigo-50 rounded-xl p-3 mb-4 text-xs text-indigo-800 space-y-1">
            <p className="font-semibold">📋 初回設定手順</p>
            <p>1. <a href="https://console.firebase.google.com/" target="_blank" className="underline font-medium">console.firebase.google.com</a> でプロジェクト作成</p>
            <p>2. Realtime Database を有効化（テストモード）</p>
            <p>3. Authentication → 匿名ログイン を有効化</p>
            <p>4. ⚙️プロジェクト設定 → マイアプリ → ウェブ → 設定をコピー</p>
          </div>
          <div className="space-y-2">
            {FIELDS.map(({key, label, ph}) => (
              <div key={key}>
                <label className="block text-xs font-medium text-gray-600 mb-0.5">{label}</label>
                <input type="text" value={config[key]}
                  onChange={e => setConfig(p => ({...p, [key]:e.target.value}))}
                  placeholder={ph}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
              </div>
            ))}
          </div>
          {error && <p className="text-red-600 text-sm mt-3 p-2 bg-red-50 rounded-lg">{error}</p>}
          <button onClick={connect} disabled={connecting}
            className="w-full mt-4 bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50">
            {connecting ? '🔄 接続中...' : '🔌 接続して開始'}
          </button>
        </div>
      </div>
    );
  };

  // ============================================================
  // ユーザー/グループセットアップモーダル
  // ============================================================
  const UserSetupModal = ({ onComplete }) => {
    const [step,     setStep]     = useState('name');
    const [nickname, setNickname] = useState('');
    const [joinId,   setJoinId]   = useState(localStorage.getItem(LS.PENDING_JOIN) || '');
    const [loading,  setLoading]  = useState(false);
    const [error,    setError]    = useState('');

    const goChoice = () => {
      const n = nickname.trim();
      if (!n)          return setError('ニックネームを入力してください');
      if (n.length>20) return setError('20文字以内で入力してください');
      setError('');
      // 招待リンクから来た場合は直接参加へ
      if (localStorage.getItem(LS.PENDING_JOIN)) { handleJoin(n); return; }
      setStep('choice');
    };

    const handleCreate = async () => {
      setLoading(true); setError('');
      try {
        const uid = firebase.auth().currentUser.uid;
        const gid = generateId('grp');
        await db.createGroup(gid, uid, nickname.trim());
        localStorage.setItem(LS.GROUP_ID,  gid);
        localStorage.setItem(LS.NICKNAME,  nickname.trim());
        onComplete({ userId:uid, nickname:nickname.trim(), groupId:gid });
      } catch(e) { setError('グループ作成に失敗: '+e.message); }
      finally { setLoading(false); }
    };

    const handleJoin = async (name) => {
      const n   = name || nickname.trim();
      const gid = (joinId || localStorage.getItem(LS.PENDING_JOIN) || '').trim();
      if (!gid) return setError('グループIDを入力してください');
      setLoading(true); setError('');
      try {
        const info = await db.getGroupInfo(gid);
        if (!info) throw new Error('グループが見つかりません');

  // ============================================================

  const readExif = async (file) => {
    try {
      if (!window.exifr) return {};
      const exif = await exifr.parse(file, { tiff:true, gps:true, ifd0:true });
      if (!exif) return {};
      const result = {};
      const dt = exif.DateTimeOriginal || exif.DateTime || exif.CreateDate;
      if (dt instanceof Date && !isNaN(dt)) result.date = dt.toISOString().split('T')[0];
      if (exif.latitude!=null && exif.longitude!=null) {
        result.latitude=exif.latitude; result.longitude=exif.longitude;
      }
      return result;
    } catch { return {}; }
  };

  // ============================================================
  // タブ: 一覧
  // ============================================================
  const ListTab = ({ records, users, onUpdate, onDelete }) => {
    const [filterSearch,  setFilterSearch]  = useState('');
    const [filterStore,   setFilterStore]   = useState('');
    const [filterProduct, setFilterProduct] = useState('');
    const [filterVolume,  setFilterVolume]  = useState('');
    const [filterFrom,    setFilterFrom]    = useState('');
    const [filterTo,      setFilterTo]      = useState('');
    const [sortKey,       setSortKey]       = useState('date_desc');
    const [editingId,     setEditingId]     = useState(null);
    const [editForm,      setEditForm]      = useState(null);

    const stores = useMemo(() => [...new Set(records.map(r=>r.store))].sort(), [records]);
    const getUserName = (id) => users.find(u=>u.id===id)?.nickname || '不明';
    const srcIcon = { photo:'📸', manual:'✍️', sns:'📰' };

    const filtered = useMemo(() => {
      const q = filterSearch.trim().toLowerCase();
      let list = records.filter(r => {
        if (q && !([r.store,r.location,r.memo,r.product].join(' ').toLowerCase().includes(q))) return false;
        if (filterStore   && r.store   !== filterStore)   return false;
        if (filterProduct && r.product !== filterProduct) return false;
        if (filterVolume  && r.volume  !== filterVolume)  return false;
        if (filterFrom    && r.date    <  filterFrom)     return false;
        if (filterTo      && r.date    >  filterTo)       return false;
        return true;
      });
      list = [...list].sort((a,b) => {
        if (sortKey==='date_desc')  return (b.date||'').localeCompare(a.date||'');
        if (sortKey==='date_asc')   return (a.date||'').localeCompare(b.date||'');
        if (sortKey==='store')      return (a.store||'').localeCompare(b.store||'', 'ja');
        if (sortKey==='price_desc') return (b.price||0)-(a.price||0);
        if (sortKey==='price_asc')  return (a.price||0)-(b.price||0);
        return 0;
      });
      return list;
    }, [records, filterSearch, filterStore, filterProduct, filterVolume, filterFrom, filterTo, sortKey]);

    const hasFilter = filterSearch||filterStore||filterProduct||filterVolume||filterFrom||filterTo;
    const clearFilters = () => {
      setFilterSearch(''); setFilterStore(''); setFilterProduct('');

          <div className="grid grid-cols-7 mb-1">

              <div key={d} className={`text-center text-xs font-medium py-1 ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-500'}`}>{d}</div>

          <div className="grid grid-cols-7 gap-1">
            {Array.from({length:firstWeekday}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:daysInMonth}).map((_,i)=>{
              const day=i+1;
              const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const has=!!byDate[ds]; const isTod=ds===todayStr; const isSel=ds===selected;
              return (

                  className={`aspect-square rounded-lg flex flex-col items-center justify-center text-sm transition-colors relative

                  {day}

                </button>

        </div>
        <div className="bg-white p-4 rounded-xl shadow-sm">
          <p className="font-medium text-gray-700 mb-3">📊 {m+1}月の購入傾向</p>
          <div className="grid grid-cols-3 gap-2 text-center">
            {[['上旬\n(1-10日)',early],['中旬\n(11-20日)',mid],['下旬\n(21-31日)',late]].map(([label,cnt])=>(

  // ============================================================
  // 予測スコア計算
  // ============================================================
  const calcPredictions = (records) => {
    const stores=[...new Set(records.map(r=>r.store))];
    return stores.map(store=>{
      const recs=records.filter(r=>r.store===store);
      const early=recs.filter(r=>new Date(r.date).getDate()<=7).length;
      const sorted=[...recs].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latest=sorted[0];
      const ds=daysSince(latest.date);
      const avgInterval=recs.length>1
        ? recs.reduce((acc,r,i,arr)=>i===0?acc:acc+(new Date(arr[i-1].date)-new Date(r.date))/86400000,0)/(recs.length-1)
        : 30;
      const perScore=Math.min(early/(recs.length||1)*2,1)*0.5+Math.min(recs.length/5,1)*0.5;
      const recScore=Math.min(ds/avgInterval,1);
      const uniq=new Set(recs.map(r=>r.userId)).size;
      const sharedScore=Math.min(uniq/3,1.0);
      const snsRecs=recs.filter(r=>r.source==='sns'&&daysSince(r.date)<7).length;
      const snsScore=Math.min(snsRecs/2,1.0);
      const sightings=recs.filter(r=>r.isSighting&&daysSince(r.date)<14);
      const sightingScore=sightings.length>0?Math.min(1,sightings.length/2)*(1-Math.min(daysSince(sightings[0]?.date||'2000-01-01'),14)/14):0;
      const prob=Math.round((perScore*0.35+recScore*0.25+sharedScore*0.15+snsScore*0.1+sightingScore*0.15)*100);
      return {store, prob, lastDate:latest.date, ds};
    }).sort((a,b)=>b.prob-a.prob);
  };

  // ============================================================

  // ============================================================
  const MapTab = ({ records }) => {

        const latest=[...recs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

    const pinStyle=d=>d<=7?'border-red-200 text-red-700':d<=30?'border-orange-200 text-orange-700':'border-green-200 text-green-700';

  // ============================================================

  // ============================================================
  // タブ: 討伐帳（スタンプカード）
  // ============================================================
  const StampTab = ({ records }) => {
    const purchases = useMemo(() => records.filter(r => !r.isSighting), [records]);
    const total = purchases.length;

    // 月別集計
    const byMonth = useMemo(() => {
      const m = {};
      purchases.forEach(r => {
        const ym = r.date.slice(0, 7);
        m[ym] = (m[ym] || 0) + 1;
      });
      return Object.entries(m).sort((a, b) => b[0].localeCompare(a[0]));
    }, [purchases]);

    const thisMonth = new Date().toISOString().slice(0, 7);
    const thisMonthCount = byMonth.find(([ym]) => ym === thisMonth)?.[1] || 0;

    // スタンプ表示用（最新50件まで）
    const stamps = purchases.slice().sort((a,b) => a.date.localeCompare(b.date));
    const STAMP_PER_CARD = 10;
    const cards = [];
    for (let i = 0; i < stamps.length; i += STAMP_PER_CARD) {
      cards.push(stamps.slice(i, i + STAMP_PER_CARD));
    }
    // 最後のカードが未完成なら空きを埋める
    if (cards.length > 0) {
      const last = cards[cards.length - 1];
      while (last.length < STAMP_PER_CARD) last.push(null);
    }

    const fmtYm = (ym) => { const [y,m] = ym.split('-'); return `${y}年${parseInt(m)}月`; };

    return (
      <div className="space-y-5">
        {/* ヒーローカード */}
        <div className="bg-gradient-to-br from-indigo-700 to-indigo-900 rounded-2xl p-6 text-white text-center shadow-lg">
          <p className="text-indigo-300 text-sm mb-1">🍶 討伐総数</p>

  const PredictionTab = ({ records }) => {

        const recs=records.filter(r=>r.store===p.store);
        const early=recs.filter(r=>new Date(r.date).getDate()<=7).length;
        const uniq=new Set(recs.map(r=>r.userId)).size;
        const snsRecs=recs.filter(r=>r.source==='sns'&&daysSince(r.date)<7).length;
        return {...p, reasons:[
          early>0  && `過去${early}回、月初（7日以内）に購入成功`,
          p.ds>=7  && `前回購入から${p.ds}日経過`,
          uniq>1   && `グループ${uniq}人が購入記録あり`,
          snsRecs>0 && `直近7日以内にSNS目撃情報あり`,

    const medals=['🥇','🥈','🥉'];

    const [installPrompt,  setInstallPrompt]  = useState(null);
    const [swReady,        setSwReady]        = useState(false);

    // Firebase リアルタイム同期
    const { records, users, syncing } = useFirebaseSync(groupId);

    // オンライン/オフライン検知
    useEffect(() => {
      const on=()=>setOnline(true), off=()=>setOnline(false);
      window.addEventListener('online',on); window.addEventListener('offline',off);
      return () => { window.removeEventListener('online',on); window.removeEventListener('offline',off); };
    }, []);

    // Service Worker & PWAインストール
    useEffect(() => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(()=>setSwReady(true)).catch(()=>{});
      }
      const handler=(e)=>{e.preventDefault();setInstallPrompt(e);};
      window.addEventListener('beforeinstallprompt', handler);
      return () => window.removeEventListener('beforeinstallprompt', handler);
    }, []);

    // Firebase初期化
    useEffect(() => {
      setApiKey(localStorage.getItem(LS.API_KEY)||'');

      // 招待リンクのグループIDを保存
      const urlParams=new URLSearchParams(window.location.search);
      const joinGid=urlParams.get('join');
      if (joinGid) localStorage.setItem(LS.PENDING_JOIN, joinGid);

      // 招待リンクにFirebase設定が含まれていれば自動保存
      const cfgParam=urlParams.get('cfg');
      if (cfgParam && !localStorage.getItem(LS.FB_CONFIG)) {
        try {
          const decoded=decodeURIComponent(escape(atob(cfgParam)));
          JSON.parse(decoded); // 正しいJSONか確認
          localStorage.setItem(LS.FB_CONFIG, decoded);
        } catch(e) { console.warn('cfg parse error', e); }
      }

      const BUILTIN_CONFIG = {
        apiKey: "AIzaSyDbzGghemge_m9_OisLKBJVfS8G6b02XM",
        authDomain: "asahitaka-hunter-ed0bb.firebaseapp.com",
        databaseURL: "https://asahitaka-hunter-ed0bb-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "asahitaka-hunter-ed0bb",
        storageBucket: "asahitaka-hunter-ed0bb.firebasestorage.app",
        messagingSenderId: "615951716527",
        appId: "1:615951716527:web:63b13947d0576c9b69045a",
      };

      const savedConfig = localStorage.getItem(LS.FB_CONFIG) || JSON.stringify(BUILTIN_CONFIG);

      const initFirebase = async () => {
        try {
          const config=JSON.parse(savedConfig);
          if (!firebase.apps.length) firebase.initializeApp(config);
          await firebase.auth().signInAnonymously();
          setFbReady(true);

          const storedGid=localStorage.getItem(LS.GROUP_ID);
          const nickname=localStorage.getItem(LS.NICKNAME);
          const uid=firebase.auth().currentUser.uid;

          if (joinGid) {
            // 招待リンクから来た場合は参加フローへ
            setShowUserSetup(true);
          } else if (storedGid && nickname) {
            // localStorageに情報あり → そのまま復元
            setCurrentUser({id:uid, nickname});
            setGroupId(storedGid);
          } else {
            // localStorageにない → Firebaseから復元を試みる
            const session = await db.getSession(uid);
            if (session && session.groupId && session.nickname) {
              localStorage.setItem(LS.GROUP_ID, session.groupId);
              localStorage.setItem(LS.NICKNAME, session.nickname);
              setCurrentUser({id:uid, nickname:session.nickname});
              setGroupId(session.groupId);
            } else {
              setShowUserSetup(true);
            }
          }
        } catch(e) {
          console.error('Firebase init error:', e);
          // localStorageの設定が壊れている場合はBUILTIN_CONFIGで再試行
          if (localStorage.getItem(LS.FB_CONFIG)) {
            localStorage.removeItem(LS.FB_CONFIG);
            try {
              if (!firebase.apps.length) firebase.initializeApp(BUILTIN_CONFIG);
              await firebase.auth().signInAnonymously();
              setFbReady(true);
              const uid = firebase.auth().currentUser.uid;
              const session = await db.getSession(uid);
              if (session && session.groupId && session.nickname) {
                localStorage.setItem(LS.GROUP_ID, session.groupId);
                localStorage.setItem(LS.NICKNAME, session.nickname);
                setCurrentUser({id:uid, nickname:session.nickname});
                setGroupId(session.groupId);
              } else {
                setShowUserSetup(true);
              }
              setReady(true); return;
            } catch(e2) { console.error('Retry failed:', e2); }
          }
          setShowFbSetup(true);
        } finally { setReady(true); }
      };
      initFirebase();
    }, []);

    // 起動時プッシュ通知チェック
    useEffect(() => {
      if (!ready||records.length===0) return;
      if (typeof Notification==='undefined'||Notification.permission!=='granted') return;
      const todayStr=today();
      const lastCheck=localStorage.getItem(LS.NOTIF_CHK)||'';
      if (lastCheck===todayStr) return;
      localStorage.setItem(LS.NOTIF_CHK, todayStr);
      const top=calcPredictions(records).find(p=>p.prob>=60);
      if (top) {
        setTimeout(() => {
          new Notification('🍶 朝日鷹ハンター — 本日の入荷チャンス！',{
            body:`${top.store}で入荷の可能性 ${top.prob}%\n前回から${top.ds}日経過`,
            icon:'/icon-192.png',
          });
        }, 2000);
      }
    }, [ready, records.length]);

    const onFbSetupComplete = async () => {
      setFbReady(true);
      setShowFbSetup(false);
      setShowUserSetup(true);
    };

    const onUserSetupComplete = async ({ userId, nickname, groupId: gid }) => {
      setCurrentUser({id:userId, nickname});
      setGroupId(gid);
      setShowUserSetup(false);
      await db.saveSession(userId, gid, nickname);
    };

    // Firebase操作
    const onSave = useCallback(async (record) => {
      if (!groupId) throw new Error('グループに参加していません');
      await db.addRecord(groupId, record);
    }, [groupId]);

    const onUpdate = useCallback(async (id, updates) => {
      if (!groupId) return;
      await db.updateRecord(groupId, id, updates);
    }, [groupId]);

    const onDelete = useCallback(async (id) => {
      if (!groupId) return;
      await db.deleteRecord(groupId, id);
    }, [groupId]);

    const onNicknameChange = useCallback(async (nickname) => {
      if (!groupId || !currentUser) return;
      await db.updateUserNickname(groupId, currentUser.id, nickname);
      await db.saveSession(currentUser.id, groupId, nickname);
      localStorage.setItem(LS.NICKNAME, nickname);
      setCurrentUser(u => ({ ...u, nickname }));
    }, [groupId, currentUser]);

    const onRemoveMember = useCallback(async (userId) => {
      if (!groupId) return;
      await db.removeUser(groupId, userId);
      await db.removeSession(userId);
    }, [groupId]);

    const onLeaveGroup = useCallback(async () => {
      if (groupId && currentUser) {
        try {
          await db.removeUser(groupId, currentUser.id);
          await db.removeSession(currentUser.id);
        } catch {}
      }
      localStorage.removeItem(LS.GROUP_ID);
      localStorage.removeItem(LS.NICKNAME);
      localStorage.removeItem(LS.PENDING_JOIN);
      window.location.reload();
    }, [groupId, currentUser]);

    if (!ready) return (
      <div className="min-h-screen bg-gray-100 flex items-center justify-center">
        <div className="text-center text-gray-400">
          <div className="text-5xl mb-2 anim-pulse">🍶</div>
          <p>Firebase接続中...</p>
        </div>
      </div>
    );

    const TABS = [
      {id:'record',     label:'記録',   icon:'📝'},
      {id:'list',       label:'一覧',   icon:'📋'},
      {id:'calendar',   label:'暦',     icon:'📅'},
      {id:'stamp',      label:'討伐',   icon:'🎖️'},
      {id:'stats',      label:'統計',   icon:'📊'},
      {id:'map',        label:'地図',   icon:'🗺️'},
      {id:'prediction', label:'予測',   icon:'🔮'},
      {id:'share',      label:'共有',   icon:'👥'},
      {id:'settings',   label:'設定',   icon:'⚙️'},
    ];

    return (
      <div className="min-h-screen bg-gray-100">
        {showFbSetup   && <FirebaseSetupModal onComplete={onFbSetupComplete} />}
        {showUserSetup && fbReady && <UserSetupModal onComplete={onUserSetupComplete} />}

        {/* ヘッダー */}
        <header className="bg-indigo-700 text-white px-4 py-3 sticky top-0 z-40 shadow-md">
          <div className="max-w-lg mx-auto flex items-center justify-between">
            <div>
              <h1 className="text-lg font-bold leading-tight">🍶 朝日鷹ハンター〜鷹狩の記録〜</h1>
              <p className="text-indigo-200 text-xs">{currentUser?.nickname||''}</p>
            </div>
            <div className="text-right">
              <p className="text-indigo-200 text-xs">{records.length} 件の記録</p>
              <div className="flex items-center justify-end gap-1 mt-0.5">
                <div className={`w-1.5 h-1.5 rounded-full ${online?'bg-green-400':'bg-red-400'}`} />
                <span className="text-xs text-indigo-200">{online?'オンライン':'オフライン'}</span>
              </div>
            </div>
          </div>
        </header>

        {/* 同期中インジケーター */}
        {syncing && (
          <div className="bg-indigo-50 border-b border-indigo-100 text-center py-1">
            <span className="text-xs text-indigo-500">🔄 同期中...</span>
          </div>
        )}

        {/* タブナビ */}
        {(() => {
          const MAIN_TABS = TABS.slice(0, 5);
          const EXTRA_TABS = TABS.slice(5);
          const activeExtra = EXTRA_TABS.find(t => t.id === tab);
          return (
            <nav className="bg-white shadow-sm sticky top-[60px] z-30">
              <div className="max-w-lg mx-auto">
                <div className="flex border-b border-gray-100">
                  {MAIN_TABS.map(t => (
                    <button key={t.id} onClick={() => { setTab(t.id); setMenuOpen(false); }}
                      className={`flex-1 px-1 py-2 text-xs font-medium border-b-2 transition-colors whitespace-nowrap text-center
                        ${tab===t.id?'border-indigo-600 text-indigo-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
                      <div>{t.icon}</div><div>{t.label}</div>
                    </button>
                  ))}
                  <button onClick={() => setMenuOpen(o => !o)}
                    className={`flex-1 px-1 py-2 text-xs font-medium border-b-2 transition-colors text-center
                      ${activeExtra||menuOpen?'border-indigo-600 text-indigo-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
                    <div>{activeExtra ? activeExtra.icon : '•••'}</div>
                    <div>{activeExtra ? activeExtra.label : 'もっと'}</div>
                  </button>
                </div>
              </div>
              {menuOpen && (
                <div className="max-w-lg mx-auto bg-white border-t border-gray-100 shadow-lg">
                  <div className="grid grid-cols-4 gap-0 p-2">
                    {EXTRA_TABS.map(t => (
                      <button key={t.id} onClick={() => { setTab(t.id); setMenuOpen(false); }}
                        className={`flex flex-col items-center gap-1 px-2 py-3 rounded-xl text-xs font-medium transition-colors
                          ${tab===t.id?'bg-indigo-50 text-indigo-600':'text-gray-600 hover:bg-gray-50'}`}>
                        <span className="text-xl">{t.icon}</span>
                        <span>{t.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </nav>
          );
        })()}

        {/* コンテンツ */}
        <main className="max-w-lg mx-auto p-4 pb-12 tab-content" key={tab}>
          {tab==='record'     && currentUser && <RecordTab currentUser={currentUser} onSave={onSave} apiKey={apiKey} />}
          {tab==='list'       && <ListTab records={records} users={users} onUpdate={onUpdate} onDelete={onDelete} />}
          {tab==='calendar'   && <CalendarTab records={records} />}
          {tab==='stamp'      && <StampTab records={records} />}
          {tab==='stats'      && <StatsTab records={records} />}
          {tab==='map'        && <MapTab records={records} />}
          {tab==='prediction' && <PredictionTab records={records} />}
          {tab==='share'      && currentUser && <ShareTab currentUser={currentUser} users={users} groupId={groupId} onRemoveMember={onRemoveMember} />}
          {tab==='settings'   && currentUser && (
            <SettingsTab
              currentUser={currentUser} apiKey={apiKey} records={records} groupId={groupId}
              onApiKeyChange={(k)=>{setApiKey(k);localStorage.setItem(LS.API_KEY,k);}}
              installPrompt={installPrompt}
              onInstall={()=>{ if(installPrompt){installPrompt.prompt();installPrompt.userChoice.then(()=>setInstallPrompt(null));} }}
              onNicknameChange={onNicknameChange}
              onLeaveGroup={onLeaveGroup}
              swReady={swReady}
            />
          )}
        </main>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
